# CI for pitty.
#
# Toolchain comes from the repo's `nix develop` shell (flake-utils +
# rust-overlay), so every job invokes cargo through `nix develop --command` to
# get the exact pinned Rust toolchain rather than a separately installed one.
#
# Action pinning: actions are pinned to a major version tag (e.g. @v6). Commit
# SHA pinning would be stricter, but major-tag pinning keeps the workflow
# readable while still avoiding floating `@main`; bump deliberately.
#
# Nix cache choice: we use DeterminateSystems/magic-nix-cache-action. Its free
# tier was shut down in early 2025 and later revived against GitHub's new cache
# API, but that integration is reverse-engineered and may break without notice.
# It is configured to fail soft (a cache fault must not fail the build); if it
# regresses, drop the cache step (build is correct without it, only slower) or
# swap in nix-community/cache-nix-action.
name: CI

on: [push, pull_request]

# Least privilege: every job only checks out, builds, and tests — none write
# back to the repo. Pinning the token to read-only here means the code we build
# and run (including the nested pitty the dogfood spawns) cannot use
# GITHUB_TOKEN to mutate the repository even if the default were write.
permissions:
  contents: read

jobs:
  lint:
    name: lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - name: cargo fmt --check
        run: nix develop --command cargo fmt --check
      - name: cargo clippy
        run: nix develop --command cargo clippy --all-targets -- -D warnings

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    # The action comments findings on the PR via GITHUB_TOKEN, which needs write
    # access to pull requests. Granted only here, not at the top level, so every
    # other job keeps the read-only default. contents:read is restated because
    # declaring job-level permissions drops the inherited top-level set.
    permissions:
      contents: read
      pull-requests: write
    steps:
      # fetch-depth: 0 so the scan can resolve the PR base ref and check every
      # commit in the range — catching a secret added in an intermediate commit
      # even if a later commit removes it. On push it scans the full history.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # The official action over a dev-shell `run:` step: it bundles a maintained
      # scanner and posts findings as PR comments. SHA-pinned because a secret
      # scanner with a write-scoped token is supply-chain sensitive.
      #
      # Config-tampering note: the action reads whatever .gitleaks.toml is in the
      # tree, so it does NOT by itself stop a PR from weakening the ruleset in the
      # same PR. Guard that operationally (review / branch protection requiring
      # this check). GITLEAKS_LICENSE is only needed for org repos; this is a
      # personal repo, so it is intentionally omitted.
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  test:
    name: test (unit + integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      # Non-ignored tests only; the PTY-gated #[ignore] tests run in pty-e2e.
      - name: cargo test
        run: nix develop --command cargo test

  pty-e2e:
    name: pty-e2e (ignored tests + dogfood)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      # GitHub Actions ubuntu runners can openpty, so the real-PTY path and the
      # nested-PTY dogfood below both work. If the nested-PTY meta tier ever
      # proves unstable on ubuntu, demote the "dogfood: meta tier" step to a
      # separate continue-on-error job rather than failing the gate. (macOS is a
      # required gate too — see the pty-e2e-macos job below.)

      # Residual negative e2e tests kept in tests/e2e.rs as a fallback until the
      # dogfood meta tier is proven stable across runners.
      - name: cargo test -- --ignored
        run: nix develop --command cargo test -- --ignored

      - name: cargo build
        run: nix develop --command cargo build

      # Dogfood: run pitty against its own scenarios. PITTY_BIN and INNER_DIR
      # are exported here and resolved inside meta scenarios via ${var} expansion
      # (parent-env fallback in src/workspace.rs). Each step's exit code is the
      # pass/fail gate: a non-zero pitty exit fails the CI step.
      - name: dogfood positive tier
        run: |
          export PITTY_BIN="$PWD/target/debug/pitty"
          export INNER_DIR="$PWD/e2e/scenarios/meta/inner"
          # Env-existence guard: the meta tier resolves ${PITTY_BIN}/${INNER_DIR}
          # from the parent env. If either is unset/missing the placeholders would
          # spawn-fail into exit 3 and the empty-spawn meta case would falsely
          # PASS. Fail loudly here instead.
          test -x "$PITTY_BIN" || { echo "PITTY_BIN not executable: $PITTY_BIN" >&2; exit 1; }
          test -d "$INNER_DIR" || { echo "INNER_DIR not a directory: $INNER_DIR" >&2; exit 1; }
          nix develop --command "$PITTY_BIN" run e2e/scenarios/positive
      - name: dogfood meta tier (nested PTY)
        run: |
          export PITTY_BIN="$PWD/target/debug/pitty"
          export INNER_DIR="$PWD/e2e/scenarios/meta/inner"
          test -x "$PITTY_BIN" || { echo "PITTY_BIN not executable: $PITTY_BIN" >&2; exit 1; }
          test -d "$INNER_DIR" || { echo "INNER_DIR not a directory: $INNER_DIR" >&2; exit 1; }
          nix develop --command "$PITTY_BIN" run e2e/scenarios/meta
      # Dogfood the matrix/bench subcommands too: e2e/scenarios/samples carries
      # passing matrix (single- and multi-axis) and bench scenarios. `run` does
      # not exercise these subcommands, so without this step a regression in
      # `pitty matrix`/`pitty bench` would not be caught by CI. Each subcommand
      # exits 0 on an all-pass scenario; a failing cell/run flips it non-zero.
      - name: dogfood samples tier (matrix + bench)
        run: |
          export PITTY_BIN="$PWD/target/debug/pitty"
          test -x "$PITTY_BIN" || { echo "PITTY_BIN not executable: $PITTY_BIN" >&2; exit 1; }
          nix develop --command "$PITTY_BIN" matrix e2e/scenarios/samples/matrix-shell.yaml
          nix develop --command "$PITTY_BIN" matrix e2e/scenarios/samples/matrix-multi-axis.yaml
          nix develop --command "$PITTY_BIN" bench e2e/scenarios/samples/bench-shell.yaml --runs 3

  pty-e2e-macos:
    name: pty-e2e (macOS)
    runs-on: macos-latest
    needs: [lint, test]
    # Required gate: the user runs pitty locally on macOS often, so a macOS PTY
    # regression must block merges, not just inform. macOS PTY teardown is slower
    # than Linux, which is why the meta tier waits for inner exit via
    # expect_exit's deadline form rather than a fixed `wait` — the stabilization
    # that makes this gate non-flaky. Do NOT reintroduce continue-on-error.
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - name: cargo test -- --ignored
        run: nix develop --command cargo test -- --ignored
      - name: cargo build
        run: nix develop --command cargo build
      - name: dogfood positive tier
        run: |
          export PITTY_BIN="$PWD/target/debug/pitty"
          export INNER_DIR="$PWD/e2e/scenarios/meta/inner"
          test -x "$PITTY_BIN" || { echo "PITTY_BIN not executable: $PITTY_BIN" >&2; exit 1; }
          test -d "$INNER_DIR" || { echo "INNER_DIR not a directory: $INNER_DIR" >&2; exit 1; }
          nix develop --command "$PITTY_BIN" run e2e/scenarios/positive
      - name: dogfood meta tier (nested PTY)
        run: |
          export PITTY_BIN="$PWD/target/debug/pitty"
          export INNER_DIR="$PWD/e2e/scenarios/meta/inner"
          test -x "$PITTY_BIN" || { echo "PITTY_BIN not executable: $PITTY_BIN" >&2; exit 1; }
          test -d "$INNER_DIR" || { echo "INNER_DIR not a directory: $INNER_DIR" >&2; exit 1; }
          nix develop --command "$PITTY_BIN" run e2e/scenarios/meta
      # Dogfood the matrix/bench subcommands too (see the ubuntu job for why).
      - name: dogfood samples tier (matrix + bench)
        run: |
          export PITTY_BIN="$PWD/target/debug/pitty"
          test -x "$PITTY_BIN" || { echo "PITTY_BIN not executable: $PITTY_BIN" >&2; exit 1; }
          nix develop --command "$PITTY_BIN" matrix e2e/scenarios/samples/matrix-shell.yaml
          nix develop --command "$PITTY_BIN" matrix e2e/scenarios/samples/matrix-multi-axis.yaml
          nix develop --command "$PITTY_BIN" bench e2e/scenarios/samples/bench-shell.yaml --runs 3
