# Dogfood inner: a secret value echoed into PTY output, then an expect that
# times out so the failure tail carries that output. This scenario is meant to
# FAIL (exit 1); its stdout JSON report must mask the secret as `***`. The outer
# verify-secret-masked.yaml asserts both the masking and the exit code. Mirrors
# the former tests/e2e.rs `secret_is_masked_in_json_report_on_timeout`.
name: secret-leak
workspace:
  temp: true
variables:
  token:
    # Keep `supersecretvalue` in sync with verify-secret-masked.yaml (which
    # asserts its absence) and tests/e2e.rs (the fallback copy).
    value: supersecretvalue
    secret: true
steps:
  - spawn: bash
  - send: echo leaked=${token}
  - expect:
      contains: this-never-appears
      timeout: 1s
