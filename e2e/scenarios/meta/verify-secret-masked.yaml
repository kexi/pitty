# Dogfood meta (nested PTY): the outer pitty spawns an inner pitty on a
# scenario that echoes a secret and then fails by timeout. The inner stdout JSON
# report flows back into the outer PTY's captured output, where we assert the
# raw secret is absent and the mask marker `***` is present, then that the inner
# process exits 1. Replaces the former tests/e2e.rs
# `secret_is_masked_in_json_report_on_timeout`.
#
# expect_not is immediate, so it is placed AFTER an expect that waits for `***`
# to appear: that ordering guarantees the inner report has actually been emitted
# before we assert the raw secret's absence (otherwise expect_not could pass
# trivially against output that has not yet arrived).
#
# ${PITTY_BIN} / ${INNER_DIR} are resolved from the parent process env by the
# ${var} expansion fallback in src/workspace.rs::expand. See
# verify-timeout-fails.yaml for the full rationale and the no-temp note.
name: verify-secret-masked
steps:
  - spawn: ${PITTY_BIN} run ${INNER_DIR}/secret-leak.yaml
  - expect:
      contains: "***"
      timeout: 10s
  - expect_not:
      contains: supersecretvalue
  # Poll for the inner pitty's exit (up to timeout) rather than a fixed wait:
  # expect_exit's deadline form removes the race where the inner process is
  # still emitting its JSON report when a too-short fixed wait elapses. The
  # margin is generous so macOS PTY teardown (slower than Linux) is covered.
  # NOTE: the secret value `supersecretvalue` above is duplicated in
  # meta/inner/secret-leak.yaml and tests/e2e.rs; keep all three in sync.
  - expect_exit:
      code: 1
      timeout: 10s
